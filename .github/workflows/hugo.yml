# Sample workflow for building and deploying a Hugo site to GitHub Pages
name: Deploy Hugo site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches:
      - master
      - hugo

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: pages
  cancel-in-progress: false

# Default to bash
defaults:
  run:
    shell: bash

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest

    env:
      HUGO_VERSION: 0.121.1

    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Install Dart Sass
        run: sudo snap install dart-sass

      - name: Checkout content from master
        uses: actions/checkout@v4
        with:
          ref: master
          path: content

      - name: Checkout Hugo site from hugo
        uses: actions/checkout@v4
        with:
          ref: hugo
          path: site
          submodules: recursive

      - name: Prepare content
        run: |
          rm -rf site/content
          mkdir -p site/content

          rsync -av --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "README.md" \
            "content/" \
            "site/content/"

      - name: Copy _assets to Hugo static
        run: |
          if [ -d "content/_assets" ]; then
            mkdir -p site/static
            cp -r content/_assets site/static/_assets
          fi

      - name: Fix asset paths for Hugo
        run: |
          # Only replace ../_assets/ inside markdown link/image syntax ]( or ](<
          # Avoids false positives in code blocks or plain text
          find site/content -name "*.md" -exec sed -i -E 's|(\]\(<?)\.\./_assets/|\1/_assets/|g' {} +

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install Node.js dependencies
        working-directory: site
        run: |
          [[ -f package-lock.json || -f npm-shrinkwrap.json ]] && npm ci || true

      - name: Build with Hugo
        working-directory: site
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/public

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
